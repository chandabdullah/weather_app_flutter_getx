name: weather_app
version: 0.1.5+12
publish_to: none
description: A new Flutter project.
environment:
  sdk: ">=3.3.4 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.6
  get: ^4.6.6
  flutter:
    sdk: flutter
  weather_icons: ^3.0.0
  gap: ^3.0.1
  intl: ^0.19.0
  sticky_headers: ^0.3.0+2
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  get_storage: ^2.1.1
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1
  flutter_dotenv: ^5.1.0
  logger: ^2.3.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.13.1
  location: ^6.0.2
  geocoding: ^3.0.0
  pull_to_refresh: ^2.0.0
  flutter_svg: ^2.0.10+1
  flutter_weather_bg_null_safety: ^1.0.0
  decorated_text: ^0.1.0
  permission_handler: ^11.3.1
  glass: ^2.0.0+1
  draggable_home: ^1.0.5
  connectivity_plus: ^6.0.3
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  glassmorphism_ui: ^0.3.0
  google_mobile_ads: ^8.0.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - .env.prod
    - assets/
    - assets/logo/
    - assets/svg/
    - assets/svg/animated/
    - assets/svg/static/
    - assets/presentation/
    - assets/design_2/
    - assets/design_3/

flutter_launcher_icons:
  android: launcher_icon
  image_path: assets/logo/app_icon.png
  ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#039DF5"
  adaptive_icon_foreground: "assets/logo/app_icon.png"

flutter_native_splash:
  color: "#039DF5"
  image: "assets/logo/splash_transparent.png"
  color_dark: "#039DF5"
  image_dark: "assets/logo/splash_transparent.png"
  android_12:
    icon_background_color: "#039DF5"
    image: "assets/logo/splash_transparent.png"
    icon_background_color_dark: "#039DF5"
    image_dark: "assets/logo/splash_transparent.png"
